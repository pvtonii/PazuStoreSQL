<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gigi's Shop">
<title>Gigi's Shop</title>
<style>
:root {
  --pink-50:#fbeaf0;--pink-100:#f4c0d1;--pink-400:#d4537e;--pink-600:#993556;--pink-800:#72243e;
  --teal-50:#e1f5ee;--teal-100:#9fe1cb;--teal-400:#1d9e75;--teal-600:#0f6e56;--teal-800:#085041;
  --amber-50:#faeeda;--amber-100:#fac775;--amber-400:#ba7517;--amber-800:#633806;
  --gray-50:#f1efe8;--gray-100:#d3d1c7;--gray-400:#888780;--gray-600:#5f5e5a;--gray-800:#444441;
  --coral-50:#faece7;--coral-100:#f5c4b3;--coral-400:#d85a30;--coral-800:#711b13;
  --purple-50:#eeedfe;--purple-800:#3c3489;
  --green-50:#eaf3de;--green-800:#27500a;
  --bg:#fff;--bg2:#f8f7f5;--text:#1a1a1a;--text2:#666;--border:rgba(0,0,0,0.12);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg2);}
body{display:flex;justify-content:center;}
#app{max-width:430px;width:100%;background:var(--bg);height:100%;display:flex;flex-direction:column;position:relative;}
.topbar{background:var(--pink-50);border-bottom:0.5px solid var(--pink-100);padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.topbar h1{font-size:16px;font-weight:500;color:var(--pink-800);flex:1;}
.logo{width:28px;height:28px;border-radius:50%;background:var(--pink-400);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#fff;flex-shrink:0;}
.sync-pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;background:var(--gray-50);color:var(--gray-800);border:0.5px solid var(--gray-100);transition:all .3s;flex-shrink:0;}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--gray-400);}
.sync-pill.syncing{background:var(--amber-50);color:var(--amber-800);border-color:var(--amber-100);}
.sync-pill.syncing .dot{background:var(--amber-400);}
.sync-pill.ok{background:var(--teal-50);color:var(--teal-800);border-color:var(--teal-100);}
.sync-pill.ok .dot{background:var(--teal-400);}
.sync-pill.error{background:var(--coral-50);color:var(--coral-800);border-color:var(--coral-100);}
.sync-pill.error .dot{background:var(--coral-400);}
.refresh-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--pink-600);cursor:pointer;padding:0;flex-shrink:0;transition:background .15s;}
.refresh-btn:hover{background:var(--pink-50);}
.refresh-btn:active{transform:scale(0.92);}
.refresh-btn svg{width:16px;height:16px;}
.refresh-btn.spinning svg{animation:spin 0.8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* ── Mais drawer ─────────────────────────────── */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;animation:fade-in .18s ease-out;display:flex;align-items:flex-end;justify-content:center;}
.drawer{position:relative;width:100%;max-width:430px;background:var(--bg);border-radius:16px 16px 0 0;padding:16px 16px calc(var(--safe-bottom) + 28px);animation:slide-up .22s ease-out;box-shadow:0 -8px 24px rgba(0,0,0,.18);}
.drawer-grip{width:36px;height:4px;background:var(--text2);opacity:.3;border-radius:2px;margin:0 auto 14px;}
.drawer-title{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin:0 0 10px 4px;}
.drawer-item{display:flex;align-items:center;gap:14px;padding:14px 12px;border-radius:10px;cursor:pointer;transition:background .15s;}
.drawer-item:hover{background:var(--bg2);}
.drawer-item:active{background:var(--pink-50);}
.drawer-item svg{width:22px;height:22px;color:var(--pink-600);flex-shrink:0;}
.drawer-item .di-label{font-size:15px;font-weight:500;color:var(--text);}
.drawer-item .di-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.drawer-item .di-chev{margin-left:auto;color:var(--text2);font-size:18px;}
@keyframes slide-up{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fade-in{from{opacity:0;}to{opacity:1;}}

/* ── Relatórios — cards clicáveis ─────────────── */
.rel-clickable{cursor:pointer;transition:transform .1s,box-shadow .15s;}
.rel-clickable:active{transform:scale(0.99);}
.rel-clickable:hover{box-shadow:0 2px 12px rgba(153,53,86,0.1);}
.rel-row{cursor:pointer;transition:background .12s;}
.rel-row:hover{background:var(--pink-50);}
.rel-row:active{background:var(--pink-100);}
.rel-bar-row{cursor:pointer;padding:8px 4px;margin:0 -4px;border-radius:6px;transition:background .12s;}
.rel-bar-row:hover{background:var(--pink-50);}
.rel-bar-row:active{background:var(--pink-100);}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 24px);}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--bg);border-top:0.5px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,0.08);display:flex;z-index:100;align-items:flex-start;}
.tab{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--gray-400);font-size:10px;font-family:inherit;transition:color .15s;min-height:var(--nav-h);}
.tab.active{color:var(--pink-600);}
.tab svg{width:18px;height:18px;transition:transform .2s;}
.tab.active svg{transform:scale(1.1);}
.stitle{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;font-size:13px;cursor:pointer;font-family:inherit;color:var(--text);transition:background .12s;}
.btn:hover{background:var(--gray-50);}
.btn-primary{background:var(--pink-400);border-color:var(--pink-400);color:#fff;}
.btn-primary:hover{background:var(--pink-600);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{color:var(--coral-400);border-color:var(--coral-100);}
input,select{width:100%;padding:8px 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.2);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:10px;}
input:focus,select:focus{outline:none;border-color:var(--pink-400);}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;}
.bg-green{background:var(--green-50);color:var(--green-800);}
.bg-pink{background:var(--pink-50);color:var(--pink-800);}
.bg-amber{background:var(--amber-50);color:var(--amber-800);}
.bg-gray{background:var(--gray-50);color:var(--gray-600);}
.bg-teal{background:var(--teal-50);color:var(--teal-800);}
.bg-coral{background:var(--coral-50);color:var(--coral-800);}
.irow{padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.irow.vendido{opacity:0.45;}
.irow.vendido .iname{text-decoration:line-through;color:var(--text2);}
.irow:last-child{border-bottom:none;}
.iname{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;}
.isub{font-size:12px;color:var(--text2);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric{background:var(--bg2);border-radius:8px;padding:12px;}
.mlbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
.mval{font-size:20px;font-weight:500;color:var(--text);}
.msub{font-size:11px;color:var(--text2);margin-top:2px;}
.sbar{position:relative;margin-bottom:14px;}
.sbar input{padding-left:32px;margin-bottom:0;}
.sbar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--gray-400);pointer-events:none;}
.frow{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.chip{padding:5px 12px;border-radius:20px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text);transition:all .12s;}
.chip.active{background:var(--pink-400);color:#fff;border-color:var(--pink-400);}
.empty{text-align:center;color:var(--text2);font-size:14px;padding:32px 0;}
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;padding:20px 16px 40px;}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.mhdr h2{font-size:16px;font-weight:500;color:var(--text);}
.xbtn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray-400);padding:0 4px;line-height:1;}
.cfg-sec{margin-bottom:22px;}
.cfg-sec h3{font-size:14px;font-weight:500;color:var(--text);margin-bottom:10px;}
.tlist{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.titem{display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:20px;padding:4px 10px 4px 12px;font-size:13px;}
.titem button{background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:16px;line-height:1;padding:0;}
.addtag{display:flex;gap:8px;}
.addtag input{margin-bottom:0;flex:1;}
.sku{font-size:11px;color:var(--text2);font-family:monospace;background:var(--gray-50);padding:2px 6px;border-radius:4px;}
.pos{color:var(--teal-600);font-weight:500;}
.neg{color:var(--coral-400);font-weight:500;}
.t5row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.t5row:last-child{border-bottom:none;}
.t5n{width:22px;height:22px;border-radius:50%;background:var(--pink-50);color:var(--pink-800);font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hr{border:none;border-top:0.5px solid rgba(0,0,0,0.08);margin:16px 0;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pcard{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.pname{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.pstats{display:flex;gap:10px;}
.pstat{font-size:12px;color:var(--text2);}
.pstat span{font-weight:500;color:var(--text);display:block;}
/* fab */
.fab{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 14px);right:calc(50% - 430px/2 + 18px);width:52px;height:52px;background:var(--pink-400);color:#fff;border:none;border-radius:50%;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 18px rgba(212,83,126,0.45);z-index:90;transition:transform .15s,box-shadow .15s;line-height:1;}
.fab:active{transform:scale(0.92);box-shadow:0 2px 8px rgba(212,83,126,0.35);}
@media(max-width:430px){.fab{right:18px;}}
/* setup */
.setup{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:24px;margin:24px 0;}
.setup h2{font-size:16px;font-weight:500;margin-bottom:8px;}
.setup p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.setup ol{font-size:13px;color:var(--text2);line-height:2.2;padding-left:18px;margin-bottom:16px;}
.setup ol b{color:var(--text);}
/* toast */
.toast-wrap{position:fixed;top:calc(var(--safe-top) + 64px);left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:398px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.13);pointer-events:all;animation:toastIn .25s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);}
.toast.out{animation:toastOut .2s ease-in forwards;}
.toast-icon{font-size:15px;flex-shrink:0;}
.toast.success{background:rgba(225,245,238,0.97);color:var(--teal-800);border:0.5px solid var(--teal-100);}
.toast.error{background:rgba(250,236,231,0.97);color:var(--coral-800);border:0.5px solid var(--coral-100);}
.toast.info{background:rgba(251,234,240,0.97);color:var(--pink-800);border:0.5px solid var(--pink-100);}
.toast.warn{background:rgba(250,238,218,0.97);color:var(--amber-800);border:0.5px solid var(--amber-100);}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-6px) scale(0.96)}}
/* autocomplete */
.ac-wrap{position:relative;margin-bottom:10px;}
.ac-wrap input{margin-bottom:0;}
.ac-drop{position:absolute;top:100%;left:0;right:0;background:var(--bg);border:0.5px solid rgba(0,0,0,0.2);border-top:none;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:300;display:none;}
.ac-drop.open{display:block;}
.ac-item{padding:10px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid rgba(0,0,0,0.06);overflow:hidden;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.selected{background:var(--pink-50);}
.ac-item .ac-name{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.ac-item .ac-sku{font-size:11px;color:var(--text2);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.notice{background:var(--amber-50);border:0.5px solid var(--amber-100);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--amber-800);margin-bottom:14px;}
/* clickable week rows */
.wk-row{cursor:pointer;transition:background .12s;margin:0 -14px;padding-left:14px;padding-right:14px;}
.wk-row:hover,.wk-row:active{background:var(--pink-50);}
.wk-row .wk-chev{color:var(--gray-400);font-size:18px;margin-left:6px;line-height:1;flex-shrink:0;}
/* ver mais button + months section */
.vm-btn{width:100%;background:transparent;border:none;color:var(--text2);font-size:12px;font-weight:500;padding:14px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;border-top:0.5px solid rgba(0,0,0,0.06);margin-top:0;}
.vm-btn:hover,.vm-btn:active{color:var(--text);}
.vm-divider{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;padding:8px 0 6px;border-bottom:0.5px solid rgba(0,0,0,0.06);margin:0 -14px 0;padding-left:14px;padding-right:14px;}
/* week detail modal */
.wd-item{padding:12px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);}
.wd-item:last-child{border-bottom:none;}
.wd-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;}
.wd-name{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0;}
.wd-lucro{font-size:13px;font-weight:500;flex-shrink:0;}
.wd-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:12px;color:var(--text2);margin-top:6px;}
.wd-meta b{color:var(--text);font-weight:500;}
.wd-summary{background:var(--bg2);border-radius:8px;padding:10px 8px;margin-bottom:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.wd-summary>div{text-align:center;min-width:0;}
.wd-summary .wd-s-lbl{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.wd-summary .wd-s-val{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">G</div>
    <h1>Gigi's Shop</h1>
    <button class="refresh-btn" id="refreshBtn" onclick="forceRefresh()" title="Atualizar dados">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <div class="sync-pill" id="syncPill"><div class="dot"></div><span id="syncTxt">–</span></div>
  </div>
  <div class="content" id="content"></div>
  <button class="fab" id="fab" style="display:none" onclick="fabAction()">＋</button>
  <div class="tabs">
    <button class="tab active" data-tab="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard
    </button>
    <button class="tab" data-tab="inventario" onclick="go('inventario')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>Inventário
    </button>
    <button class="tab" data-tab="listagem" onclick="go('listagem')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Listagem
    </button>
    <button class="tab" data-tab="mais" onclick="openMaisDrawer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>Mais
    </button>
  </div>
  <div id="mc"></div>
  <div class="toast-wrap" id="toastWrap"></div>
</div>
<script>
// ── STATE ──────────────────────────────────────────────────
let SB_URL = localStorage.getItem('gigi_sb_url') || '';
let SB_KEY = localStorage.getItem('gigi_sb_key') || '';
const LS = 'gigi_shop_v3';
let S = {
  inventario:[], listagem:[], gastos:[], insumos:[],
  config:{
    categorias:['Eletrônicos','Roupas','Calçados','Acessórios','Decoração','Brinquedos','Geral'],
    locaisCompra:['State Sale','Goodwill','Próprio','Salvation Army','Outros'],
    estadosCompra:['Novo','Usado','Razoável'],
    statusVenda:['Vendido','Ativo','Expirado'],
    plataformas:['eBay','Marketplace','Depop','Vinted'],
    formasPgto:['CashApp','Venmo','Cash','Zelle','OnApp'],
    statusItem:['Em Estoque','Listado'],
  }
};
let tab='dashboard', invF='Todos', lstF='Todos', invQ='', lstQ='', invStatus='Todos', invSort='recente', gastosTab='fixos', invSexo='Todos', gastosFQ='', gastosFSort='recente', relTab='performance';
try{ const s=localStorage.getItem(LS); if(s) S=JSON.parse(s); }catch(e){}
function saveL(){ try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){} }

// ── TOAST ──────────────────────────────────────────────────
const ICONS={success:'✅',error:'❌',info:'ℹ️',warn:'⚠️'};
function toast(msg, type='info', duration=3000){
  const wrap=document.getElementById('toastWrap');
  if(!wrap) return;
  const el=document.createElement('div');
  el.className='toast '+type;
  el.innerHTML=`<span class="toast-icon">${ICONS[type]||'ℹ️'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(),220); }, duration);
}

// ── SUPABASE SYNC ─────────────────────────────────────────
function setSyncUI(st, txt){
  const p=document.getElementById('syncPill');
  const t=document.getElementById('syncTxt');
  if(p){ p.className='sync-pill '+st; }
  if(t) t.textContent=txt;
}

function sbHeaders(){
  return {
    'Content-Type':'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer '+SB_KEY,
    'Prefer': 'return=representation',
  };
}

async function sbGet(table, params='', opts={}){
  // Importante: NÃO adicionar headers como 'Cache-Control' aqui — eles quebram o CORS do PostgREST.
  // Pra burlar cache, usamos cache:'no-store' + timestamp na query.
  const url=SB_URL+'/rest/v1/'+table+'?'+params + (opts.noCache?('&_ts='+Date.now()):'');
  const r=await fetch(url, { headers: sbHeaders(), cache: opts.noCache?'no-store':'default' });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbUpsert(table, data){
  const r=await fetch(SB_URL+'/rest/v1/'+table, {
    method:'POST',
    headers:{ ...sbHeaders(), 'Prefer':'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(data),
  });
  if(!r.ok) throw new Error(await r.text());
}

async function sbDelete(table, col, val){
  const r=await fetch(SB_URL+'/rest/v1/'+table+'?'+col+'=eq.'+encodeURIComponent(val), {
    method:'DELETE',
    headers: sbHeaders(),
  });
  if(!r.ok) throw new Error(await r.text());
}

async function syncFromSupabase(opts={}){
  if(!SB_URL||!SB_KEY) return;
  setSyncUI('syncing','lendo');
  try{
    const [invRaw, lstRaw, gastosRaw, insumosRaw, cfgRaw] = await Promise.all([
      sbGet('inventario','select=*&order=created_at.asc',opts),
      sbGet('listagem','select=*&order=created_at.asc',opts),
      sbGet('gastos','select=*&order=data.desc',opts),
      sbGet('insumos','select=*&order=nome.asc',opts),
      sbGet('config','select=*',opts),
    ]);

    // Deduplicate inventory by sku
    const invMap={};
    invRaw.forEach(i=>{ if(i.sku) invMap[i.sku]=i; });
    S.inventario=Object.values(invMap);

    // Deduplicate listagem by id
    const lstMap={};
    lstRaw.forEach(l=>{ if(l.id) lstMap[l.id]=l; });
    S.listagem=Object.values(lstMap);

    S.gastos=gastosRaw||[];
    S.insumos=insumosRaw||[];

    // Config stored as key-value rows
    if(cfgRaw&&cfgRaw.length){
      cfgRaw.forEach(row=>{
        if(row.chave&&row.valores){
          try{ S.config[row.chave]=JSON.parse(row.valores); }catch(e){}
        }
      });
    }

    saveL(); render();
    setSyncUI('ok','sincronizado');
    toast('Dados sincronizados!','success');
  }catch(e){ setSyncUI('error','sem conexão'); toast('Erro ao sincronizar com o Supabase','error'); console.error(e); }
}

async function forceRefresh(){
  if(!SB_URL||!SB_KEY){ toast('Configure o Supabase em Config primeiro','warn'); return; }
  const btn=document.getElementById('refreshBtn');
  if(btn) btn.classList.add('spinning');
  try{
    await syncFromSupabase({noCache:true});
  } finally {
    if(btn){
      // Mantém girando por pelo menos 400ms pra dar feedback visual mesmo se a rede for muito rápida
      setTimeout(()=>btn.classList.remove('spinning'), 400);
    }
  }
}

// ── HELPERS ────────────────────────────────────────────────
function genSKU(){
  const nums=S.inventario.map(i=>{
    const m=String(i.sku||'').match(/^GP-(\d+)$/);
    return m?parseInt(m[1]):0;
  });
  const next=(nums.length?Math.max(...nums):0)+1;
  return 'GP-'+String(next).padStart(4,'0');
}
function cleanDate(v){
  if(!v) return '';
  const s=String(v);
  // Sheets sometimes returns full ISO timestamp like "2024-01-15T00:00:00.000Z"
  const m=s.match(/^(\d{4}-\d{2}-\d{2})/);
  return m?m[1]:'';
}
function fm(v){ return '$'+(parseFloat(v)||0).toFixed(2); }
function getVV(sku){ const l=S.listagem.find(l=>l.sku===sku&&l.status==='Vendido'); return l?parseFloat(l.valorVendido)||0:0; }
// Helpers de embalagem — suportam formato novo (array embalagens) e legado (embalagemId único)
function lstEmbalagens(l){
  if(!l) return [];
  // Formato novo: array de objetos { insumoId, qtd, custoUnit }
  if(Array.isArray(l.embalagens) && l.embalagens.length){
    return l.embalagens.map(e=>({
      insumoId:e.insumoId||e.id||'',
      qtd:parseFloat(e.qtd)||1,
      custoUnit:parseFloat(e.custoUnit)||0,
    }));
  }
  // Pode vir como JSON string do Supabase
  if(typeof l.embalagens==='string' && l.embalagens.trim()){
    try{
      const arr=JSON.parse(l.embalagens);
      if(Array.isArray(arr)&&arr.length){
        return arr.map(e=>({
          insumoId:e.insumoId||e.id||'',
          qtd:parseFloat(e.qtd)||1,
          custoUnit:parseFloat(e.custoUnit)||0,
        }));
      }
    }catch(_){}
  }
  // Formato legado: embalagemId + custoEmbalagem
  if(l.embalagemId){
    return [{insumoId:l.embalagemId, qtd:1, custoUnit:parseFloat(l.custoEmbalagem)||0}];
  }
  return [];
}
function getEmb(sku){
  const l=S.listagem.find(l=>l.sku===sku&&l.status==='Vendido');
  if(!l) return 0;
  // Se já tem custoEmbalagem total salvo, usa direto (snapshot histórico)
  if(l.custoEmbalagem!==undefined && l.custoEmbalagem!==null && l.custoEmbalagem!=='') return parseFloat(l.custoEmbalagem)||0;
  // Senão calcula do array
  return lstEmbalagens(l).reduce((s,e)=>s+e.qtd*e.custoUnit,0);
}
function getEmbNome(sku){
  const l=S.listagem.find(l=>l.sku===sku&&l.status==='Vendido');
  if(!l) return '';
  const arr=lstEmbalagens(l);
  if(!arr.length) return '';
  return arr.map(e=>{
    const ins=S.insumos.find(i=>i.id===e.insumoId);
    const nome=ins?ins.nome:'?';
    return e.qtd>1?`${nome} ×${e.qtd}`:nome;
  }).join(', ');
}
function getSV(sku){
  const ls=S.listagem.filter(l=>l.sku===sku);
  if(!ls.length) return '';
  if(ls.some(l=>l.status==='Vendido')) return 'Vendido';
  if(ls.some(l=>l.status==='Ativo')) return 'Ativo';
  return ls[0].status||'';
}

function renderDash(){
  const inv=S.inventario, lst=S.listagem;
  const totalMercadoria=inv.reduce((s,i)=>s+(parseFloat(i.valorPago)||0),0);
  const totalFixos=S.gastos.filter(g=>g.categoria==='fixo'||!g.categoria).reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const totalInsumos=S.gastos.filter(g=>g.categoria==='insumo').reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const totalInvestido=totalMercadoria+totalFixos+totalInsumos;
  const vends=inv.filter(i=>getSV(i.sku)==='Vendido');
  const totalVV=vends.reduce((s,i)=>s+getVV(i.sku),0);
  const totalEmb=vends.reduce((s,i)=>s+getEmb(i.sku),0);
  const totalPagoVend=vends.reduce((s,i)=>s+(parseFloat(i.valorPago)||0),0);
  const lucroTotal=totalVV-totalPagoVend-totalEmb;
  const mgs=vends.map(i=>{ const p=parseFloat(i.valorPago)||0; const e=getEmb(i.sku); return p?(getVV(i.sku)-p-e)/p*100:0; });
  const mg=mgs.length?mgs.reduce((a,b)=>a+b,0)/mgs.length:0;

  // Estimativa por plataforma: pega o MAIOR valor entre as listagens ativas de um mesmo SKU
  // (evita somar duplicatas de itens listados em múltiplas plataformas)
  const plats=S.config.plataformas;
  const activeLst=lst.filter(l=>l.status==='Ativo');

  // Por plataforma: soma independente (cada plataforma tem seu anúncio)
  const estPorPlat={};
  plats.forEach(p=>{
    estPorPlat[p]=activeLst.filter(l=>l.plataforma===p)
      .reduce((s,l)=>s+(parseFloat(l.valorAlterado)||parseFloat(l.valorListado)||0),0);
  });

  // Total estimativa: para cada SKU ativo, pega apenas o MAIOR valor entre plataformas
  // (para não contar o mesmo item múltiplas vezes no total)
  const skusAtivos=[...new Set(activeLst.map(l=>l.sku))];
  const estTotal=skusAtivos.reduce((s,sku)=>{
    const vals=activeLst.filter(l=>l.sku===sku)
      .map(l=>parseFloat(l.valorAlterado)||parseFloat(l.valorListado)||0);

  const vendsUniq=Object.values(Object.fromEntries(vends.map(i=>[i.sku,i])));
  const top5=[...vendsUniq].map(i=>({...i,lucro:getVV(i.sku)-(parseFloat(i.valorPago)||0)-getEmb(i.sku)}))

          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:var(--amber-800);font-weight:600;margin-bottom:4px">⚠️ Estoque de insumos baixo</div>
            <div style="font-size:12px;color:var(--amber-800);line-height:1.5">
              ${insumosBaixos.map(i=>`<b>${i.nome}</b> (${i.qtdEstoque}/${i.qtdMinima})`).join(' · ')}
            </div>
          </div>
          <span style="color:var(--amber-800);font-size:18px;flex-shrink:0">›</span>
        </div>
      </div>
    `:''}
    <p class="stitle">Resumo financeiro</p>
    <div class="mgrid">
      <div class="metric"><div class="mlbl">Total investido</div><div class="mval">${fm(totalInvestido)}</div><div class="msub">Mercadoria + fixos + insumos</div></div>
      <div class="metric"><div class="mlbl">Total em mercadoria</div><div class="mval">${fm(totalMercadoria)}</div><div class="msub">${inv.length} ${inv.length===1?'peça':'peças'}</div></div>
      <div class="metric"><div class="mlbl">Custos fixos</div><div class="mval" style="color:var(--coral-400)">${fm(totalFixos)}</div></div>
      <div class="metric"><div class="mlbl">Insumos</div><div class="mval" style="color:var(--coral-400)">${fm(totalInsumos)}</div></div>
      <div class="metric"><div class="mlbl">Total arrecadado</div><div class="mval">${fm(totalVV)}</div></div>
      <div class="metric"><div class="mlbl">Lucro total</div><div class="mval ${lucroTotal>=0?'pos':'neg'}">${fm(lucroTotal)}</div><div class="msub">Já descontando embalagens</div></div>
      <div class="metric"><div class="mlbl">Custo embalagens</div><div class="mval" style="color:var(--coral-400)">${fm(totalEmb)}</div></div>

// ── WEEKLY REPORT ─────────────────────────────────────────
function renderWeekly(lst,inv){
  // Group sold listings by week (Mon-Sun), last 8 weeks
  const sold=lst.filter(l=>l.status==='Vendido'&&l.dataVenda);
  if(!sold.length) return '<div class="empty" style="padding:16px 0">Nenhuma venda com data registrada ainda</div>';

  // Get monday of a date's week
  function monOf(d){ const dt=new Date(d+'T12:00:00'); const day=dt.getDay(); const diff=day===0?-6:1-day; dt.setDate(dt.getDate()+diff); return dt.toISOString().slice(0,10); }

  const weeks={};
  sold.forEach(l=>{
    const wk=monOf(l.dataVenda);
    if(!weeks[wk]) weeks[wk]={vendas:0,investido:0,lucro:0,count:0};
    const vv=parseFloat(l.valorVendido)||0;
    const emb=parseFloat(l.custoEmbalagem)||0;
    const invItem=inv.find(i=>i.sku===l.sku);
    const pago=invItem?parseFloat(invItem.valorPago)||0:0;
    weeks[wk].vendas+=vv;
    weeks[wk].investido+=pago;
    weeks[wk].lucro+=vv-pago-emb;
    weeks[wk].count++;
  });

  const sortedAll=Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0]));
  const recent=sortedAll.slice(0,4);
  const hasMore=sortedAll.length>4;

  function fmtWk(mon){
    const d=new Date(mon+'T12:00:00');
    const sun=new Date(d); sun.setDate(d.getDate()+6);
    const fmt=dt=>dt.toLocaleDateString('pt-BR',{month:'short',day:'numeric'});
    return fmt(d)+' – '+fmt(sun);
  }

  // Group ALL sold listings by month (YYYY-MM), last 6 months
  const months={};
  sold.forEach(l=>{
    const mk=l.dataVenda.slice(0,7);
    if(!months[mk]) months[mk]={vendas:0,investido:0,lucro:0,count:0};
    const vv=parseFloat(l.valorVendido)||0;
    const emb=parseFloat(l.custoEmbalagem)||0;
    const invItem=inv.find(i=>i.sku===l.sku);
    const pago=invItem?parseFloat(invItem.valorPago)||0:0;
    months[mk].vendas+=vv;
    months[mk].investido+=pago;
    months[mk].lucro+=vv-pago-emb;
    months[mk].count++;
  });
  const sortedMonths=Object.entries(months).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);

  function fmtMonth(mk){
    const [y,m]=mk.split('-');
    const d=new Date(parseInt(y),parseInt(m)-1,1);
    return d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase());
  }

  return `<div class="card" style="padding:0 14px">
    ${recent.map(([wk,data])=>`
      <div class="irow wk-row" onclick="openWeekDetail('${wk}')">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text)">${fmtWk(wk)}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${data.count} ${data.count===1?'item':'itens'} vendidos</div>
          </div>
          <div style="display:flex;align-items:center">
            <div style="text-align:right">
              <div style="font-size:13px;font-weight:500;color:var(--teal-600)">${fm(data.vendas)}</div>
              <div style="font-size:11px;color:var(--text2)">lucro: <span class="${data.lucro>=0?'pos':'neg'}">${fm(data.lucro)}</span></div>
            </div>
            <span class="wk-chev">›</span>
          </div>
        </div>
      </div>`).join('')}
    ${hasMore?`
      <button id="vmBtn" class="vm-btn" onclick="toggleMonthsView()">
        <span id="vmLabel">Ver meses anteriores</span>
        <span id="vmIcon" style="margin-left:6px;transition:transform .2s;display:inline-block">▾</span>
      </button>
      <div id="monthsView" style="display:none">
        <div class="vm-divider">Por mês</div>
        ${sortedMonths.map(([mk,data])=>`
          <div class="irow wk-row" onclick="openMonthDetail('${mk}')">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:13px;font-weight:500;color:var(--text)">${fmtMonth(mk)}</div>
                <div style="font-size:11px;color:var(--text2);margin-top:2px">${data.count} ${data.count===1?'item':'itens'} vendidos</div>
              </div>
              <div style="display:flex;align-items:center">
                <div style="text-align:right">
                  <div style="font-size:13px;font-weight:500;color:var(--teal-600)">${fm(data.vendas)}</div>
                  <div style="font-size:11px;color:var(--text2)">lucro: <span class="${data.lucro>=0?'pos':'neg'}">${fm(data.lucro)}</span></div>
                </div>
                <span class="wk-chev">›</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    `:''}
  </div>`;
}

function toggleMonthsView(){
  const v=document.getElementById('monthsView');
  const lbl=document.getElementById('vmLabel');
  const ic=document.getElementById('vmIcon');
  if(v.style.display==='none'){
    v.style.display='block';
    lbl.textContent='Ocultar meses anteriores';
    ic.style.transform='rotate(180deg)';
  } else {
    v.style.display='none';
    lbl.textContent='Ver meses anteriores';
    ic.style.transform='rotate(0deg)';
  }
}

// ── MONTH DETAIL MODAL (shows weeks of that month) ────────
function openMonthDetail(monthKey){
  // monthKey = 'YYYY-MM'
  const [y,m]=monthKey.split('-').map(Number);
  const monthStart=monthKey+'-01';
  const monthEnd=new Date(y,m,0).toISOString().slice(0,10); // last day

  // Filter sold listings in this month
  const soldInMonth=S.listagem.filter(l=>
    l.status==='Vendido'&&l.dataVenda&&
    l.dataVenda>=monthStart&&l.dataVenda<=monthEnd
  );

  // Group by week
  function monOf(d){ const dt=new Date(d+'T12:00:00'); const day=dt.getDay(); const diff=day===0?-6:1-day; dt.setDate(dt.getDate()+diff); return dt.toISOString().slice(0,10); }
  const wks={};
  let totVendas=0,totInvest=0,totLucro=0,totCount=0;
  soldInMonth.forEach(l=>{
    const wk=monOf(l.dataVenda);
    if(!wks[wk]) wks[wk]={vendas:0,investido:0,lucro:0,count:0};
    const vv=parseFloat(l.valorVendido)||0;
    const emb=parseFloat(l.custoEmbalagem)||0;
    const invItem=S.inventario.find(i=>i.sku===l.sku);
    const pago=invItem?parseFloat(invItem.valorPago)||0:0;
    wks[wk].vendas+=vv; wks[wk].investido+=pago; wks[wk].lucro+=vv-pago-emb; wks[wk].count++;
    totVendas+=vv; totInvest+=pago; totLucro+=vv-pago-emb; totCount++;
  });
  const sortedWks=Object.entries(wks).sort((a,b)=>b[0].localeCompare(a[0]));

  function fmtWk(mon){
    const d=new Date(mon+'T12:00:00');
    const sun=new Date(d); sun.setDate(d.getDate()+6);
    const fmt=dt=>dt.toLocaleDateString('pt-BR',{month:'short',day:'numeric'});
    return fmt(d)+' – '+fmt(sun);
  }
  const monthName=new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase());

  document.getElementById('mc').innerHTML=`
    <div class="mbg" onclick="if(event.target===this)cm()">
      <div class="modal">
        <div class="mhdr">
          <h2>${monthName}</h2>
          <button class="xbtn" onclick="cm()">×</button>
        </div>
        ${totCount?`
          <div class="wd-summary">
            <div><div class="wd-s-lbl">Itens</div><div class="wd-s-val">${totCount}</div></div>
            <div><div class="wd-s-lbl">Investido</div><div class="wd-s-val" style="color:var(--coral-400)">${fm(totInvest)}</div></div>
            <div><div class="wd-s-lbl">Arrecadado</div><div class="wd-s-val" style="color:var(--teal-600)">${fm(totVendas)}</div></div>
            <div><div class="wd-s-lbl">Lucro</div><div class="wd-s-val ${totLucro>=0?'pos':'neg'}">${fm(totLucro)}</div></div>
          </div>
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding:0 2px">Semanas</div>
          ${sortedWks.map(([wk,data])=>`
            <div class="irow wk-row" style="margin:0 -4px;padding-left:4px;padding-right:4px" onclick="openWeekDetail('${wk}')">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div>
                  <div style="font-size:13px;font-weight:500;color:var(--text)">${fmtWk(wk)}</div>
                  <div style="font-size:11px;color:var(--text2);margin-top:2px">${data.count} ${data.count===1?'item':'itens'}</div>
                </div>
                <div style="display:flex;align-items:center">
                  <div style="text-align:right">
                    <div style="font-size:13px;font-weight:500;color:var(--teal-600)">${fm(data.vendas)}</div>
                    <div style="font-size:11px;color:var(--text2)">lucro: <span class="${data.lucro>=0?'pos':'neg'}">${fm(data.lucro)}</span></div>
                  </div>
                  <span class="wk-chev">›</span>
                </div>
              </div>
            </div>`).join('')}
        `:`<div class="empty">Nenhuma venda neste mês</div>`}
      </div>
    </div>`;
}

// ── WEEK DETAIL MODAL ─────────────────────────────────────
function openWeekDetail(weekStart){
  // weekStart is Monday (YYYY-MM-DD). Calculate Sunday.
  const mon=new Date(weekStart+'T12:00:00');
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const sunStr=sun.toISOString().slice(0,10);

  // Get all sold listings in this week
  const soldInWeek=S.listagem.filter(l=>
    l.status==='Vendido' && l.dataVenda &&
    l.dataVenda>=weekStart && l.dataVenda<=sunStr
  );

  // Build enriched items with calculated fields
  const items=soldInWeek.map(l=>{
    const invItem=S.inventario.find(i=>i.sku===l.sku);
    const pago=invItem?parseFloat(invItem.valorPago)||0:0;
    const vendido=parseFloat(l.valorVendido)||0;
    const custoEmb=getEmb(l.sku);
    const lucro=vendido-pago-custoEmb;
    const embNome=getEmbNome(l.sku);
    // Days in stock: from dataCompra to dataVenda
    let dias='—';
    if(invItem&&invItem.dataCompra&&l.dataVenda){
      const dc=new Date(invItem.dataCompra+'T12:00:00');
      const dv=new Date(l.dataVenda+'T12:00:00');
      const diff=Math.round((dv-dc)/(1000*60*60*24));
      if(!isNaN(diff)&&diff>=0) dias=diff+' '+(diff===1?'dia':'dias');
    }
    return {
      sku:l.sku,
      nome:invItem?invItem.nome:'(item removido)',
      pago, vendido, lucro, custoEmb, embNome,
      dias,
      plataforma:l.plataforma||'—',
      dataVenda:l.dataVenda,
    };
  }).sort((a,b)=>(b.dataVenda||'').localeCompare(a.dataVenda||''));

  const totInvestido=items.reduce((s,i)=>s+i.pago,0);
  const totVendas=items.reduce((s,i)=>s+i.vendido,0);
  const totEmb=items.reduce((s,i)=>s+i.custoEmb,0);
  const totLucro=items.reduce((s,i)=>s+i.lucro,0);

  const fmt=dt=>new Date(dt+'T12:00:00').toLocaleDateString('pt-BR',{month:'short',day:'numeric'});
  const titulo=fmt(weekStart)+' – '+fmt(sunStr);

  document.getElementById('mc').innerHTML=`
    <div class="mbg" onclick="if(event.target===this)cm()">
      <div class="modal">
        <div class="mhdr">
          <h2>Vendas · ${titulo}</h2>
          <button class="xbtn" onclick="cm()">×</button>
        </div>
        ${items.length?`
          <div class="wd-summary">
            <div><div class="wd-s-lbl">Itens</div><div class="wd-s-val">${items.length}</div></div>
            <div><div class="wd-s-lbl">Investido</div><div class="wd-s-val" style="color:var(--coral-400)">${fm(totInvestido)}</div></div>
            <div><div class="wd-s-lbl">Arrecadado</div><div class="wd-s-val" style="color:var(--teal-600)">${fm(totVendas)}</div></div>
            <div><div class="wd-s-lbl">Lucro</div><div class="wd-s-val ${totLucro>=0?'pos':'neg'}">${fm(totLucro)}</div></div>
          </div>
          ${items.map(i=>`
            <div class="wd-item" style="cursor:pointer" onclick="cm();openItemDetail('${i.sku}')">
              <div class="wd-head">
                <div class="wd-name">${i.nome}<div style="margin-top:3px"><span class="sku">${i.sku}</span></div></div>
                <div class="wd-lucro ${i.lucro>=0?'pos':'neg'}">${i.lucro>=0?'+':''}${fm(i.lucro)}</div>
              </div>
              <div class="wd-meta">
                <div>Pago: <b>${fm(i.pago)}</b></div>
                <div>Vendido: <b>${fm(i.vendido)}</b></div>
                <div>Em estoque: <b>${i.dias}</b></div>
                <div>Plataforma: <b>${i.plataforma}</b></div>
                ${i.embNome?`<div style="grid-column:1/-1">Embalagem: <b>${i.embNome}</b> (${fm(i.custoEmb)})</div>`:''}
              </div>
            </div>`).join('')}
        `:`<div class="empty">Nenhuma venda nesta semana</div>`}
      </div>
    </div>`;
}

// ── INVENTÁRIO ────────────────────────────────────────────
function bStatus(s){ return s==='Em Estoque'?`<span class="badge bg-teal">${s}</span>`:s==='Listado'?`<span class="badge bg-pink">${s}</span>`:`<span class="badge bg-gray">${s||'—'}</span>`; }
function bVenda(s){ return s==='Vendido'?`<span class="badge bg-green">${s}</span>`:s==='Ativo'?`<span class="badge bg-amber">${s}</span>`:s==='Expirado'?`<span class="badge bg-coral">${s}</span>`:`<span class="badge bg-gray">${s||'—'}</span>`; }

function renderInv(){
  const cats=['Todos',...S.config.categorias];
  let items=S.inventario.filter(i=>{
    const q=invQ.toLowerCase();
    return !q||(i.nome||'').toLowerCase().includes(q)||(i.sku||'').toLowerCase().includes(q)||
      (i.localCompra||'').toLowerCase().includes(q)||(i.categoria||'').toLowerCase().includes(q);
  });
  if(invF!=='Todos') items=items.filter(i=>i.categoria===invF);
  if(invSexo!=='Todos') items=items.filter(i=>(i.sexo||'')===(invSexo==='—'?'':invSexo));
  if(invStatus==='Vendidos') items=items.filter(i=>getSV(i.sku)==='Vendido');
  else if(invStatus==='Ativos') items=items.filter(i=>getSV(i.sku)!=='Vendido');
  // Sort
  if(invSort==='az') items=[...items].sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  else if(invSort==='za') items=[...items].sort((a,b)=>(b.nome||'').localeCompare(a.nome||''));
  else if(invSort==='maior') items=[...items].sort((a,b)=>(parseFloat(b.valorPago)||0)-(parseFloat(a.valorPago)||0));
  else if(invSort==='menor') items=[...items].sort((a,b)=>(parseFloat(a.valorPago)||0)-(parseFloat(b.valorPago)||0));
  else if(invSort==='lucro') items=[...items].sort((a,b)=>(getVV(b.sku)-(parseFloat(b.valorPago)||0)-getEmb(b.sku))-(getVV(a.sku)-(parseFloat(a.valorPago)||0)-getEmb(a.sku)));
  else items=[...items].reverse(); // recente = último inserido primeiro
  return `
    <div class="sbar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="invSearch" placeholder="Buscar por nome, SKU, local..." value="${invQ}" oninput="invQ=this.value;render();const el=document.getElementById('invSearch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}"/>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <div class="frow" style="margin:0;flex:1;min-width:0">
        ${['Todos','Ativos','Vendidos'].map(s=>`<button class="chip ${invStatus===s?'active':''}" onclick="invStatus='${s}';render()">${s}</button>`).join('')}
      </div>
      <select onchange="invSort=this.value;render()" style="width:auto;margin:0;padding:5px 10px;font-size:12px;flex-shrink:0">
        <option value="recente" ${invSort==='recente'?'selected':''}>Mais recente</option>
        <option value="az" ${invSort==='az'?'selected':''}>A → Z</option>
        <option value="za" ${invSort==='za'?'selected':''}>Z → A</option>
        <option value="maior" ${invSort==='maior'?'selected':''}>Maior valor pago</option>
        <option value="menor" ${invSort==='menor'?'selected':''}>Menor valor pago</option>
        <option value="lucro" ${invSort==='lucro'?'selected':''}>Maior lucro</option>
      </select>
    </div>
    <div class="frow">${cats.map(c=>`<button class="chip ${invF===c?'active':''}" onclick="invF='${c}';render()">${c}</button>`).join('')}</div>
    <div class="frow">
      ${['Todos','F','M','U','—'].map(s=>`<button class="chip ${invSexo===s?'active':''}" onclick="invSexo='${s}';render()">${s==='Todos'?'Todos sexos':s==='—'?'Sem sexo':s}</button>`).join('')}
    </div>
    ${items.length===0?'<div class="empty">Nenhum item encontrado</div>':`
    <div class="card" style="padding:0 14px">
      ${items.map(i=>{
        const vv=getVV(i.sku);
        const emb=getEmb(i.sku);
        const lucro=vv-(parseFloat(i.valorPago)||0)-emb;
        const mg=(parseFloat(i.valorPago)||0)>0?lucro/parseFloat(i.valorPago)*100:0;
        const sv=getSV(i.sku);
        return `<div class="irow ${sv==='Vendido'?'vendido':''}">
          <div style="display:flex;justify-content:space-between;gap:8px">
            <div style="flex:1;min-width:0">
              <div class="iname">${i.nome}${i.sexo?` <span class="badge bg-${i.sexo==='F'?'pink':i.sexo==='M'?'teal':'gray'}" style="font-size:10px;margin-left:4px">${i.sexo}</span>`:''}</div>
              <div class="isub" style="margin-bottom:6px"><span class="sku">${i.sku}</span><span>${i.categoria||'—'}</span><span>${i.estadoCompra||'—'}</span></div>
              <div class="isub">
                <span>Pago: <b>${fm(i.valorPago)}</b></span>
                ${vv?`<span>Vendido: <b>${fm(vv)}</b></span>`:''}
                ${emb?`<span>Emb: <b>${fm(emb)}</b></span>`:''}
                ${vv?`<span class="${lucro>=0?'pos':'neg'}">Lucro: ${fm(lucro)} (${mg.toFixed(0)}%)</span>`:''}
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0">
              ${bStatus(i.statusItem)}${sv?bVenda(sv):''}
              <div style="display:flex;gap:4px;margin-top:2px">
                <button class="btn btn-sm" onclick='openInvModalObj(${JSON.stringify(i)})' style="padding:4px 8px">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="delInv('${i.sku}')" style="padding:4px 8px">🗑</button>
              </div>
            </div>
          </div>
          <div class="isub" style="margin-top:4px">
            <span>${i.localCompra||'—'}</span>
            <span>Compra: ${i.dataCompra||'—'}</span>
            ${(()=>{const l=S.listagem.find(x=>x.sku===i.sku&&x.status==='Vendido');return l&&l.dataVenda?`<span>Venda: <b>${l.dataVenda}</b></span>`:''})()}
          </div>
        </div>`;}).join('')}
    </div>`}`;
}

// ── GASTOS ────────────────────────────────────────────────
function renderGastos(){

function renderGastosFixos(){
  // Filtrar apenas categoria 'fixo' (ou sem categoria, considerando legado)
  let gastos=S.gastos.filter(g=>g.categoria==='fixo'||!g.categoria);
  const totalGeral=gastos.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  // Busca
  if(gastosFQ){
    const q=gastosFQ.toLowerCase();
    gastos=gastos.filter(g=>(g.item||'').toLowerCase().includes(q));
  }
  // Ordenação
  if(gastosFSort==='antigo') gastos=[...gastos].sort((a,b)=>(a.data||'').localeCompare(b.data||''));
  else if(gastosFSort==='maior') gastos=[...gastos].sort((a,b)=>(parseFloat(b.valor)||0)-(parseFloat(a.valor)||0));
  else if(gastosFSort==='menor') gastos=[...gastos].sort((a,b)=>(parseFloat(a.valor)||0)-(parseFloat(b.valor)||0));
  else if(gastosFSort==='az') gastos=[...gastos].sort((a,b)=>(a.item||'').localeCompare(b.item||''));
  else gastos=[...gastos].sort((a,b)=>(b.data||'').localeCompare(a.data||'')); // recente
  const totalFiltrado=gastos.reduce((s,g)=>s+(parseFloat(g.valor)||0),0);
  const filtrando=!!gastosFQ;
  return `
    <div class="metric" style="margin-bottom:12px">
      <div class="mlbl">Total em custos fixos${filtrando?' (filtrado)':''}</div>
      <div class="mval neg">${fm(filtrando?totalFiltrado:totalGeral)}</div>
      <div class="msub">${gastos.length} registro${gastos.length!==1?'s':''}${filtrando?` de ${S.gastos.filter(g=>g.categoria==='fixo'||!g.categoria).length} total`:' · Compra única (etiquetadora, estantes...)'}</div>
    </div>
    <div class="sbar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="gastosFSearch" placeholder="Buscar por descrição..." value="${gastosFQ}" oninput="gastosFQ=this.value;render();const el=document.getElementById('gastosFSearch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}"/>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <select onchange="gastosFSort=this.value;render()" style="width:auto;margin:0;padding:5px 10px;font-size:12px;flex:1">
        <option value="recente" ${gastosFSort==='recente'?'selected':''}>📅 Mais recente</option>
        <option value="antigo" ${gastosFSort==='antigo'?'selected':''}>📅 Mais antigo</option>
        <option value="maior" ${gastosFSort==='maior'?'selected':''}>💰 Maior valor</option>
        <option value="menor" ${gastosFSort==='menor'?'selected':''}>💰 Menor valor</option>
        <option value="az" ${gastosFSort==='az'?'selected':''}>🔤 A → Z</option>
      </select>
      ${gastosFQ?`<button class="btn btn-sm" onclick="gastosFQ='';render()" style="padding:5px 10px">✕ Limpar</button>`:''}
    </div>
    ${gastos.length===0?`<div class="empty">${filtrando?'Nenhum custo encontrado com esse filtro':'Nenhum custo fixo registrado'}</div>`:`
    <div class="card" style="padding:0 14px">
      ${gastos.map(g=>`
        <div class="irow">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div style="flex:1;min-width:0">
              <div class="iname">${g.item}</div>
              <div class="isub"><span>${g.data||'—'}</span></div>
            </div>

              <div style="font-size:15px;font-weight:500;color:var(--coral-400)">${fm(g.valor)}</div>

            </div>
          </div>
        </div>`).join('')}
    </div>`}`;
}

async function saveInsumo(editId){
  const nome=document.getElementById('i_nome').value.trim();
  if(!nome){ toast('Nome é obrigatório','error'); return; }
  const insumo={
    id: editId||('I-'+Date.now()),
    nome,
    qtdEstoque: parseFloat(document.getElementById('i_qtd').value)||0,
    qtdMinima: parseFloat(document.getElementById('i_min').value)||0,
    valorUnitario: parseFloat(document.getElementById('i_valor').value)||0,
  };
  if(editId){
    const idx=S.insumos.findIndex(i=>i.id===editId);
    if(idx>=0) S.insumos[idx]=insumo; else S.insumos.push(insumo);
  } else {
    S.insumos.push(insumo);
  }
  saveL(); cm(); render();
  await pushUpsertInsumo(insumo);
  toast(editId?`"${nome}" atualizado`:`"${nome}" cadastrado`,'success');
}

async function delInsumo(id){

  S.insumos=S.insumos.filter(i=>i.id!==id);

  toast(`"${nome}" removido`,'warn');

    const prev=document.getElementById('c_preview');
    if(q>0&&v>0){

      const vAtual=parseFloat(e.valorUnitario)||0;
      const novoTotal=qAtual+q;
      const novoUnit=(qAtual*vAtual+v)/novoTotal;
      const unitCompra=v/q;
      prev.style.display='block';
      prev.innerHTML=`
        <div>Unitário desta compra: <b>${fm(unitCompra)}</b></div>
        <div style="margin-top:3px">Novo estoque: <b>${novoTotal}</b></div>
        <div style="margin-top:3px">Novo valor unit. (média ponderada): <b>${fm(novoUnit)}</b></div>

}

async function saveCompraInsumo(insumoId){
  const insumo=S.insumos.find(i=>i.id===insumoId);
  if(!insumo){ toast('Insumo não encontrado','error'); return; }
  const qtd=parseFloat(document.getElementById('c_qtd').value)||0;
  const valor=parseFloat(document.getElementById('c_valor').value)||0;
  const data=document.getElementById('c_data').value;
  if(qtd<=0||valor<=0){ toast('Informe quantidade e valor','error'); return; }
  // Média ponderada
  const qAtual=parseFloat(insumo.qtdEstoque)||0;
  const vAtual=parseFloat(insumo.valorUnitario)||0;
  const novoTotal=qAtual+qtd;
  insumo.qtdEstoque=novoTotal;
  insumo.valorUnitario=(qAtual*vAtual+valor)/novoTotal;
  // Registrar gasto vinculado
  const gasto={
    id:'G-'+Date.now(),
    item:`Compra: ${insumo.nome} (${qtd} un)`,
    valor: valor,
    data: data,
    categoria:'insumo',
    insumoId: insumo.id,
    quantidade: qtd,
  };
  S.gastos.push(gasto);
  saveL(); cm(); render();
  await pushUpsertInsumo(insumo);
  await pushUpsertGasto(gasto);
  toast(`Compra registrada: ${qtd} ${insumo.nome}`,'success');
}

function relBuildSold(){
  // Constrói lista enriquecida de TODAS as vendas com dados úteis
  const sold=S.listagem.filter(l=>l.status==='Vendido');
  return sold.map(l=>{
    const inv=S.inventario.find(i=>i.sku===l.sku);
    const pago=inv?parseFloat(inv.valorPago)||0:0;
    const vendido=parseFloat(l.valorVendido)||0;
    const custoEmb=parseFloat(l.custoEmbalagem)||0;
    const lucro=vendido-pago-custoEmb;
    const margem=pago>0?(lucro/pago)*100:0;
    let dias=null;
    if(inv&&inv.dataCompra&&l.dataVenda){
      const dc=new Date(inv.dataCompra+'T12:00:00');
      const dv=new Date(l.dataVenda+'T12:00:00');
      const diff=Math.round((dv-dc)/(1000*60*60*24));
      if(!isNaN(diff)&&diff>=0) dias=diff;
    }
    return {
      sku:l.sku, nome:inv?inv.nome:'(removido)',
      categoria:inv?inv.categoria:'—',
      sexo:inv?(inv.sexo||''):'',
      estado:inv?inv.estadoCompra:'—',
      local:inv?inv.localCompra:'—',
      plataforma:l.plataforma||'—',
      formaPgto:l.formaPgto||'—',
      pago, vendido, custoEmb, lucro, margem, dias,
      dataVenda:l.dataVenda||'',
      dataCompra:inv?inv.dataCompra:'',
    };
  });
}

  const sold=relBuildSold();

// ── Performance ─────────────────────────────────────────
function renderRelPerformance(sold){
  // Sort copies
  const porLucro=[...sold].sort((a,b)=>b.lucro-a.lucro);
  const porMargem=[...sold].filter(s=>s.pago>0).sort((a,b)=>b.margem-a.margem);
  const comDias=sold.filter(s=>s.dias!=null);
  const maisDemorou=[...comDias].sort((a,b)=>b.dias-a.dias);
  const maisRapido=[...comDias].sort((a,b)=>a.dias-b.dias);
  // Mais vendidos por NOME
  const porNome={};
  sold.forEach(s=>{
    if(!porNome[s.nome]) porNome[s.nome]={nome:s.nome, sku:s.sku, categoria:s.categoria, sexo:s.sexo, count:0, lucroTotal:0};
    porNome[s.nome].count++;
    porNome[s.nome].lucroTotal+=s.lucro;
  });
  const maisVendidos=Object.values(porNome).filter(x=>x.count>1).sort((a,b)=>b.count-a.count);

  return `
    ${maisVendidos.length>0?relSummaryCard('perf_mais_vendidos', '🔁 Itens que mais venderam', 'Mesmo nome aparecendo em múltiplas vendas',
      maisVendidos, relRowCount, `Ver todos os ${maisVendidos.length}`
    ):''}

    ${relSummaryCard('perf_lucro', '💰 Mais lucrativos', 'Por valor absoluto de lucro ($)',
      porLucro, relRowItem, `Ver todos os ${porLucro.length}`
    )}

    ${relSummaryCard('perf_margem', '📈 Melhor margem (%)', 'Lucro relativo ao valor pago',
      porMargem, relRowMargem, `Ver todos os ${porMargem.length}`
    )}

    ${maisRapido.length>0?relSummaryCard('perf_rapido', '⚡ Venderam mais rápido', 'Menos tempo entre compra e venda',
      maisRapido, (it,idx)=>relRowDias(it,idx,true), `Ver todos os ${maisRapido.length}`
    ):''}

    ${maisDemorou.length>0?relSummaryCard('perf_lento', '🐌 Mais tempo parados', 'Tempo entre compra e venda',
      maisDemorou, (it,idx)=>relRowDias(it,idx,false), `Ver todos os ${maisDemorou.length}`
    ):''}
  `;
}

function relBarRow(label, valor, maxValor, sublabel, color){
  const pct = maxValor>0 ? (valor/maxValor)*100 : 0;
  return `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <div style="font-size:13px;color:var(--text);font-weight:500">${label}</div>
        <div style="font-size:12px;color:var(--text2)">${sublabel||''}</div>
      </div>
      <div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${color||'var(--pink-600)'};border-radius:4px;transition:width .25s"></div>
      </div>
    </div>`;
}

function relGroupBy(arr, keyFn){
  const out={};
  arr.forEach(s=>{
    const k = keyFn(s) || '—';
    if(!out[k]) out[k]={ key:k, count:0, receita:0, lucro:0, pago:0, margens:[], items:[] };
    out[k].count++;
    out[k].receita+=s.vendido;
    out[k].lucro+=s.lucro;
    out[k].pago+=s.pago;
    out[k].items.push(s);
    if(s.pago>0) out[k].margens.push(s.margem);
  });
  return Object.values(out).map(g=>({
    ...g,
    margemMedia: g.margens.length? g.margens.reduce((a,b)=>a+b,0)/g.margens.length : 0,
  }));
}

// Renderiza grupos como barras clicáveis (drill-down via cache)
function relRenderGroupClickable(grupos, sortBy, barColor, cachePrefix){
  if(!grupos.length) return '<div class="empty" style="padding:14px 0">Sem dados</div>';
  const sorted=[...grupos].sort((a,b)=>b[sortBy]-a[sortBy]);
  const max=Math.max(...sorted.map(g=>g[sortBy]),1);
  return sorted.map((g,i)=>{
    const pct = max>0 ? (g[sortBy]/max)*100 : 0;
    const cacheKey = `${cachePrefix}_${i}`;
    // Ordenar items por lucro pra mostrar os mais relevantes primeiro
    const itemsSorted = [...g.items].sort((a,b)=>b.lucro-a.lucro);
    window.__relCache[cacheKey] = {
      title: g.key,
      subtitle: `${g.count} ${g.count===1?'venda':'vendas'} · ${fm(g.receita)} · margem ${g.margemMedia.toFixed(0)}%`,
      items: itemsSorted,
      renderItem: relRowItem,
    };
    return `
      <div class="rel-bar-row" onclick="openRelList('${cacheKey}')">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px">
          <div style="font-size:13px;color:var(--text);font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${g.key}</div>
          <div style="font-size:12px;color:var(--text2);flex-shrink:0">${g.count} venda${g.count!==1?'s':''} · ${fm(g.receita)} · ${g.margemMedia.toFixed(0)}% mg</div>
        </div>
        <div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${barColor||'var(--pink-600)'};border-radius:4px;transition:width .25s"></div>
        </div>
      </div>`;
  }).join('');
}

// ── Tempo ─────────────────────────────────────────
function renderRelTempo(sold){
  // 1. Sazonalidade — soma de vendas por mês (independente do ano)
  const monthNames=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const monthNamesFull=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const porMes=Array(12).fill(null).map((_,i)=>({mes:i, label:monthNames[i], labelFull:monthNamesFull[i], count:0, receita:0, lucro:0, items:[]}));
  sold.forEach(s=>{
    if(!s.dataVenda) return;
    const m=parseInt(s.dataVenda.slice(5,7))-1;
    if(m>=0&&m<12){
      porMes[m].count++;
      porMes[m].receita+=s.vendido;
      porMes[m].lucro+=s.lucro;
      porMes[m].items.push(s);
    }
  });
  const maxRec=Math.max(...porMes.map(m=>m.receita),1);

  // 2. Vendas por mês — últimos 12 meses, com ano
  const ultimos12={};
  const hoje=new Date();
  for(let i=11;i>=0;i--){
    const d=new Date(hoje.getFullYear(), hoje.getMonth()-i, 1);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    ultimos12[k]={key:k, label:monthNames[d.getMonth()]+'/'+String(d.getFullYear()).slice(2), labelFull:monthNamesFull[d.getMonth()]+' de '+d.getFullYear(), count:0, receita:0, lucro:0, items:[]};
  }
  sold.forEach(s=>{
    if(!s.dataVenda) return;
    const k=s.dataVenda.slice(0,7);
    if(ultimos12[k]){
      ultimos12[k].count++;
      ultimos12[k].receita+=s.vendido;
      ultimos12[k].lucro+=s.lucro;
      ultimos12[k].items.push(s);
    }
  });
  const u12=Object.values(ultimos12);
  const maxRec12=Math.max(...u12.map(m=>m.receita),1);

  // 3. Velocidade média de giro
  const comDias=sold.filter(s=>s.dias!=null);
  const mediaDias = comDias.length ? (comDias.reduce((s,x)=>s+x.dias,0)/comDias.length) : 0;
  const minDias = comDias.length ? Math.min(...comDias.map(x=>x.dias)) : 0;
  const maxDias = comDias.length ? Math.max(...comDias.map(x=>x.dias)) : 0;

  // Identificar mês "champion" (maior receita histórica)
  const champion=[...porMes].sort((a,b)=>b.receita-a.receita)[0];

  // Renderiza uma barra clicável de tempo
  function tempoBarra(m, max, cacheKey, fullLabel, color){
    if(m.items.length>0){
      const items=[...m.items].sort((a,b)=>(b.dataVenda||'').localeCompare(a.dataVenda||''));
      window.__relCache[cacheKey]={
        title: fullLabel,
        subtitle: `${m.count} venda${m.count!==1?'s':''} · ${fm(m.receita)} · lucro ${fm(m.lucro)}`,
        items, renderItem: relRowItem,
      };
    }
    const pct = max>0 ? (m.receita/max)*100 : 0;
    const clickable = m.items.length>0;
    return `
      <div class="${clickable?'rel-bar-row':''}" ${clickable?`onclick="openRelList('${cacheKey}')"`:''}>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;gap:8px">
          <div style="font-size:13px;color:var(--text);font-weight:500">${m.label}</div>
          <div style="font-size:12px;color:var(--text2)">${m.count>0?`${m.count} venda${m.count!==1?'s':''} · ${fm(m.receita)}`:'sem vendas'}</div>
        </div>
        <div style="height:8px;background:var(--bg2);border-radius:4px;overflow:hidden">
          <div style="width:${pct}%;height:100%;background:${color};border-radius:4px;transition:width .25s"></div>
        </div>
      </div>`;
  }

  return `
    ${relCard('🌞 Sazonalidade (todos os anos juntos)',
      `Mês historicamente mais forte: <b>${champion.count>0?champion.labelFull:'—'}</b> · ${fm(champion.receita)}`,
      porMes.map((m,i)=>tempoBarra(
        m, maxRec, `temp_sazon_${i}`, m.labelFull+' (todos os anos)',
        m.receita===maxRec&&m.receita>0?'var(--teal-600)':'var(--pink-600)'
      )).join('')
    )}

    ${relCard('📅 Últimos 12 meses', 'Tap em uma barra pra ver as vendas daquele mês',
      u12.map((m,i)=>tempoBarra(
        m, maxRec12, `temp_u12_${i}`, m.labelFull,
        'var(--pink-600)'
      )).join('')
    )}

    ${comDias.length>0?relCard('⏱️ Velocidade de giro do estoque',
      'Tempo entre comprar e vender',
      `<div class="mgrid">
        <div class="metric"><div class="mlbl">Média</div><div class="mval">${mediaDias.toFixed(0)} dias</div></div>
        <div class="metric"><div class="mlbl">Mais rápido</div><div class="mval" style="color:var(--teal-600)">${minDias} ${minDias===1?'dia':'dias'}</div></div>
        <div class="metric"><div class="mlbl">Mais lento</div><div class="mval" style="color:var(--coral-400)">${maxDias} ${maxDias===1?'dia':'dias'}</div></div>
        <div class="metric"><div class="mlbl">Amostra</div><div class="mval">${comDias.length} ${comDias.length===1?'venda':'vendas'}</div></div>
      </div>`
    ):''}
  `;
}

// ── AUTOCOMPLETE ──────────────────────────────────────────
let acSelected=-1;
function buildAC(inputId, dropId, hiddenId){
  const inp=document.getElementById(inputId);
  const drop=document.getElementById(dropId);
  if(!inp||!drop) return;
  inp.addEventListener('input',()=>{
    const q=inp.value.toLowerCase();
    const matches=S.inventario.filter(i=>
      (i.nome||'').toLowerCase().includes(q)||(i.sku||'').toLowerCase().includes(q)
    ).slice(0,50);
    if(!q||matches.length===0){ drop.className='ac-drop'; return; }
    drop.innerHTML=matches.map((i,idx)=>
      `<div class="ac-item" data-idx="${idx}" data-sku="${i.sku}" onclick="selectAC('${inputId}','${dropId}','${hiddenId}','${i.sku}','${i.nome.replace(/'/g,"&#39;")}')">
        <div class="ac-name">${i.nome}</div>
        <div class="ac-sku">${i.sku} · ${i.categoria||''} · ${i.localCompra||''}</div>
      </div>`).join('');
    drop.className='ac-drop open';
    acSelected=-1;
  });
  inp.addEventListener('keydown',e=>{
    const items=drop.querySelectorAll('.ac-item');
    if(e.key==='ArrowDown'){ acSelected=Math.min(acSelected+1,items.length-1); highlightAC(items); e.preventDefault(); }
    else if(e.key==='ArrowUp'){ acSelected=Math.max(acSelected-1,0); highlightAC(items); e.preventDefault(); }
    else if(e.key==='Enter'&&acSelected>=0){ items[acSelected].click(); e.preventDefault(); }
    else if(e.key==='Escape'){ drop.className='ac-drop'; }
  });
  document.addEventListener('click',ev=>{ if(!inp.contains(ev.target)&&!drop.contains(ev.target)) drop.className='ac-drop'; },{once:false});
}
function highlightAC(items){ items.forEach((el,i)=>el.classList.toggle('selected',i===acSelected)); }
function selectAC(inputId,dropId,hiddenId,sku,nome){
  document.getElementById(inputId).value=nome+' ('+sku+')';
  document.getElementById(hiddenId).value=sku;
  document.getElementById(dropId).className='ac-drop';
  // preenche plataforma se já tiver listagem para esse SKU
}

          <div><label>Categoria</label><select id="f_cat">${c.categorias.map(x=>`<option ${e&&e.categoria===x?'selected':''}>${x}</option>`).join('')}</select></div>
          <div><label>Estado</label><select id="f_est">${c.estadosCompra.map(x=>`<option ${e&&e.estadoCompra===x?'selected':''}>${x}</option>`).join('')}</select></div>
        </div>
        <div class="form-row">
          <div><label>Valor pago ($)</label><input type="number" id="f_pago" value="${e?e.valorPago||'':''}" placeholder="0.00" step="0.01"/></div>
          <div><label>Local de compra</label><select id="f_loc">${c.locaisCompra.map(x=>`<option ${e&&e.localCompra===x?'selected':''}>${x}</option>`).join('')}</select></div>
        </div>
        <div class="form-row">
          <div><label>Sexo (se for roupa)</label><select id="f_sex">${sexoOpts.map(o=>`<option value="${o.v}" ${e&&(e.sexo||'')===o.v?'selected':''}>${o.l}</option>`).join('')}</select></div>
          <div><label>Status do item</label><select id="f_si">${c.statusItem.map(x=>`<option ${e&&e.statusItem===x?'selected':''}>${x}</option>`).join('')}</select></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveInv('${e?e.sku:''}')">Salvar</button>
      </div>
    </div>`;
}
function openInvModalObj(i){ openInvModal(i); }
async function saveInv(editSku){
  const nome=document.getElementById('f_nome').value.trim();
  if(!nome){ toast('Nome do item é obrigatório','error'); return; }
  const item={
    nome, sku:document.getElementById('f_sku').value.trim(),
    categoria:document.getElementById('f_cat').value,
    dataCompra:document.getElementById('f_data').value,
    valorPago:document.getElementById('f_pago').value,
    localCompra:document.getElementById('f_loc').value,
    estadoCompra:document.getElementById('f_est').value,
    statusItem:document.getElementById('f_si').value,
    sexo:document.getElementById('f_sex').value,
  };
  if(editSku && editSku !== item.sku){
    const updatedListings=[];
    S.listagem.forEach(l=>{
      if(l.sku===editSku){
        l.sku=item.sku;
        updatedListings.push({...l});
      }
    });
    await pushDelete('inventario', editSku);
    for(const l of updatedListings){ await pushUpsert('listagem', l); }
  }
  if(editSku){
    S.inventario=S.inventario.filter(i=>i.sku!==editSku);
  }
  S.inventario=S.inventario.filter(i=>i.sku!==item.sku);
  S.inventario.push(item);
  saveL(); cm(); render(); await pushUpsert('inventario',item);
  toast(editSku?`"${item.nome}" atualizado`:`"${item.nome}" adicionado ao inventário`,'success');
}

// ── CRUD LST ──────────────────────────────────────────────
async function delLst(id){
  if(!confirm('Remover anúncio?')) return;
  // Se for uma venda com embalagens, devolver as quantidades ao estoque
  const l=S.listagem.find(x=>x.id===id);
  if(l && l.status==='Vendido'){
    const embs=lstEmbalagens(l);
    for(const e of embs){
      const ins=S.insumos.find(i=>i.id===e.insumoId);
      if(ins){ ins.qtdEstoque=(parseFloat(ins.qtdEstoque)||0)+(parseFloat(e.qtd)||0); await pushUpsertInsumo(ins); }
    }
  }
  S.listagem=S.listagem.filter(l=>l.id!==id);
  saveL(); render(); await pushDelete('listagem',id);
  toast('Anúncio removido','warn');
}

  const editNome=e?(S.inventario.find(i=>i.sku===e.sku)||{}).nome||'':'';

  const embIniciais=e?lstEmbalagens(e):[];

  document.getElementById('mc').innerHTML=`
    <div class="mbg" onclick="if(event.target===this)cm()">
      <div class="modal">
        <div class="mhdr"><h2>${e?'Editar anúncio':'Novo anúncio'}</h2><button class="xbtn" onclick="cm()">×</button></div>

        <div class="ac-wrap">
          <input id="l_sku_inp" placeholder="Buscar por nome ou SKU..." value="${editNome?editNome+' ('+editSku+')':''}"/>
