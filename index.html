          <div><label>Plataforma</label><select id="l_plat">${c.plataformas.map(x=>`<option ${e&&e.plataforma===x?'selected':''}>${x}</option>`).join('')}</select></div>
          <div><label>Data listagem</label><input type="date" id="l_data" value="${e?e.dataListagem||'':''}"/></div>
        </div>
        <div class="form-row">
          <div><label>Valor listado ($)</label><input type="number" id="l_vlst" value="${e?e.valorListado||'':''}" placeholder="0.00" step="0.01"/></div>
          <div><label>Valor alterado ($)</label><input type="number" id="l_valt" value="${e?e.valorAlterado||'':''}" placeholder="Opcional" step="0.01"/></div>
        </div>
        <div class="form-row">
          <div><label>Valor vendido ($)</label><input type="number" id="l_vvnd" value="${e?e.valorVendido||'':''}" placeholder="0.00" step="0.01"/></div>
          <div><label>Forma de pgto</label><select id="l_pgto"><option value="">—</option>${c.formasPgto.map(x=>`<option ${e&&e.formaPgto===x?'selected':''}>${x}</option>`).join('')}</select></div>
        </div>
        <label>Status</label>
        <select id="l_st" onchange="toggleEmbField()">${c.statusVenda.map(x=>`<option ${(e?e.status===x:x==='Ativo')?'selected':''}>${x}</option>`).join('')}</select>
        <label>Data da venda</label>
        <input type="date" id="l_dvnd" value="${e?e.dataVenda||'':''}"/>
        <div id="l_emb_wrap" style="display:${e&&e.status==='Vendido'?'block':'none'}">
          <label>Embalagens usadas</label>
          <div id="l_embs_list"></div>
          <button type="button" class="btn btn-sm" style="width:100%;margin-bottom:10px" onclick="addEmbRow()">+ Adicionar embalagem</button>
          <div id="l_emb_total" style="font-size:12px;color:var(--text2);margin-top:-4px;margin-bottom:10px"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveLst('${e?e.id:''}')">Salvar</button>
      </div>
    </div>`;
  buildAC('l_sku_inp','l_sku_drop','l_sku_val');
  renderEmbRows();
}
function renderEmbRows(){
  const wrap=document.getElementById('l_embs_list');
  if(!wrap) return;
  const embs=window.__lstEmbs||[];
  if(embs.length===0){
    wrap.innerHTML='<div style="font-size:12px;color:var(--text2);padding:6px 2px 10px">Nenhuma embalagem. Clique abaixo pra adicionar.</div>';
    document.getElementById('l_emb_total').innerHTML='';
    return;
  }
  // Insumos disponíveis
  const insumos=S.insumos;
  wrap.innerHTML=embs.map((emb,idx)=>{
    const insOptsHtml=insumos.map(i=>{
      const sel=i.id===emb.insumoId?'selected':'';
      const dispEstoque=parseFloat(i.qtdEstoque)||0;
      return `<option value="${i.id}" ${sel}>${i.nome} · ${fm(i.valorUnitario)} (${dispEstoque} disp)</option>`;
    }).join('');
    return `
    <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:8px">
      <div style="flex:1;min-width:0">
        <select onchange="updateEmbRow(${idx},'insumoId',this.value)">
          <option value="">— Selecione —</option>
          ${insOptsHtml}
        </select>
      </div>
      <div style="width:64px;flex-shrink:0">
        <input type="number" min="1" step="1" value="${emb.qtd||1}" placeholder="qtd" onchange="updateEmbRow(${idx},'qtd',this.value)" style="text-align:center"/>
      </div>
      <button type="button" class="btn btn-sm btn-danger" onclick="removeEmbRow(${idx})" style="padding:7px 10px;flex-shrink:0">✕</button>
    </div>`;
  }).join('');
  // Total
  let total=0;
  embs.forEach(emb=>{
    const ins=insumos.find(i=>i.id===emb.insumoId);
    if(ins){ total += (parseFloat(ins.valorUnitario)||0) * (parseFloat(emb.qtd)||0); }
  });
  document.getElementById('l_emb_total').innerHTML=`Total das embalagens: <b>${fm(total)}</b>`;
}
function addEmbRow(){
  if(!window.__lstEmbs) window.__lstEmbs=[];
  window.__lstEmbs.push({insumoId:'',qtd:1,custoUnit:0});
  renderEmbRows();
}
function removeEmbRow(idx){
  if(!window.__lstEmbs) return;
  window.__lstEmbs.splice(idx,1);
  renderEmbRows();
}
function updateEmbRow(idx,field,value){
  if(!window.__lstEmbs||!window.__lstEmbs[idx]) return;
  if(field==='qtd'){ window.__lstEmbs[idx].qtd = Math.max(1, parseInt(value)||1); }
  else { window.__lstEmbs[idx][field] = value; }
  // Atualizar custoUnit baseado no insumo
  if(field==='insumoId'){
    const ins=S.insumos.find(i=>i.id===value);
    window.__lstEmbs[idx].custoUnit = ins ? (parseFloat(ins.valorUnitario)||0) : 0;
  }
  renderEmbRows();
}
function toggleEmbField(){
  const st=document.getElementById('l_st').value;
  document.getElementById('l_emb_wrap').style.display = st==='Vendido' ? 'block' : 'none';
}
function openLstModalObj(l){ openLstModal(l); }
async function saveLst(editId){
  const sku=document.getElementById('l_sku_val').value;
  if(!sku){ toast('Selecione um item','error'); return; }
  const status=document.getElementById('l_st').value;
  // Pegar registro anterior pra reverter estoque
  const oldListing = editId ? S.listagem.find(l=>l.id===editId) : null;
  const oldEmbs = (oldListing && oldListing.status==='Vendido') ? lstEmbalagens(oldListing) : [];
  // Pegar embalagens novas (só se Vendido)
  let newEmbs = [];
  if(status==='Vendido'){
    const raw = window.__lstEmbs || [];
    // Filtrar entradas válidas (com insumoId e qtd > 0)
    newEmbs = raw.filter(e=>e.insumoId && (parseFloat(e.qtd)||0)>0).map(e=>{
      const ins=S.insumos.find(i=>i.id===e.insumoId);
      return {
        insumoId: e.insumoId,
        qtd: parseInt(e.qtd)||1,
        custoUnit: ins ? (parseFloat(ins.valorUnitario)||0) : (parseFloat(e.custoUnit)||0),
      };
    });
  }
  // Reverter estoque dos antigos (devolve qtd ao insumo)
  for(const oe of oldEmbs){
    const ins=S.insumos.find(i=>i.id===oe.insumoId);
    if(ins){ ins.qtdEstoque=(parseFloat(ins.qtdEstoque)||0) + (parseFloat(oe.qtd)||0); }
  }
  // Debitar estoque dos novos
  const baixos=[];
  for(const ne of newEmbs){
    const ins=S.insumos.find(i=>i.id===ne.insumoId);
    if(ins){
      ins.qtdEstoque=Math.max(0,(parseFloat(ins.qtdEstoque)||0) - (parseFloat(ne.qtd)||0));
      const qAtual=parseFloat(ins.qtdEstoque)||0;
      const min=parseFloat(ins.qtdMinima)||0;
      if(qAtual<=min) baixos.push(`${ins.nome} (${qAtual})`);
    }
  }
  // Persistir todos os insumos afetados
  const afetados=new Set([...oldEmbs.map(e=>e.insumoId), ...newEmbs.map(e=>e.insumoId)]);
  for(const insId of afetados){
    const ins=S.insumos.find(i=>i.id===insId);
    if(ins) await pushUpsertInsumo(ins);
  }
  // Calcular custo total
  const custoTotalEmb = newEmbs.reduce((s,e)=>s + (e.qtd*e.custoUnit), 0);
  const listing={
    id:editId||('L-'+Date.now()), sku,
    plataforma:document.getElementById('l_plat').value,
    dataListagem:document.getElementById('l_data').value,
    valorListado:document.getElementById('l_vlst').value,
    valorAlterado:document.getElementById('l_valt').value,
    valorVendido:document.getElementById('l_vvnd').value,
    dataVenda:document.getElementById('l_dvnd').value,
    formaPgto:document.getElementById('l_pgto').value,
    status,
    embalagens: status==='Vendido' ? newEmbs : [],
    custoEmbalagem: status==='Vendido' ? custoTotalEmb : 0,
    // limpar campos legados
    embalagemId: '',
  };
  if(editId){ const idx=S.listagem.findIndex(l=>l.id===editId); if(idx>=0) S.listagem[idx]=listing; else S.listagem.push(listing); }
  else S.listagem.push(listing);
  const toDelete=[];
  if(status==='Vendido'){
    S.listagem.forEach(l=>{
      if(l.sku===sku && l.id!==listing.id && l.status!=='Vendido'){
        toDelete.push(l.id);
      }
    });
    S.listagem=S.listagem.filter(l=>!toDelete.includes(l.id));
  }
  const inv=S.inventario.find(i=>i.sku===sku);
  if(inv){ inv.statusItem='Listado'; await pushUpsert('inventario',inv); }
  saveL(); cm(); render();
  await pushUpsert('listagem',listing);
  for(const id of toDelete){ await pushDelete('listagem',id); }
  const nomeLst=inv?inv.nome:sku;
  if(status==='Vendido') toast(`"${nomeLst}" marcado como vendido! 🎉`,'success');
  else if(editId) toast(`Anúncio de "${nomeLst}" atualizado`,'success');
  else toast(`"${nomeLst}" adicionado à listagem`,'success');
  if(baixos.length) setTimeout(()=>toast(`⚠️ Estoque baixo: ${baixos.join(' · ')}`,'warn',5000),400);
  // Limpar variável temporária
  window.__lstEmbs=[];
}
// ── ITEM DETAIL MODAL ─────────────────────────────────────
function openItemDetail(sku){
  const inv=S.inventario.find(i=>i.sku===sku);
  if(!inv){ toast('Item não encontrado','error'); return; }
  const lst=S.listagem.find(l=>l.sku===sku&&l.status==='Vendido');
  const ativos=S.listagem.filter(l=>l.sku===sku&&l.status==='Ativo');
  const pago=parseFloat(inv.valorPago)||0;
  const vendido=lst?(parseFloat(lst.valorVendido)||0):0;
  const custoEmb=lst?getEmb(sku):0;
  const lucro=lst?(vendido-pago-custoEmb):0;
  const margem=pago>0?((lucro/pago)*100):0;
  // Dias em estoque
  let dias='—';
  if(lst&&lst.dataVenda&&inv.dataCompra){
    const dc=new Date(inv.dataCompra+'T12:00:00');
    const dv=new Date(lst.dataVenda+'T12:00:00');
    const diff=Math.round((dv-dc)/(1000*60*60*24));
    if(!isNaN(diff)&&diff>=0) dias=diff+' '+(diff===1?'dia':'dias');
  } else if(!lst && inv.dataCompra){
    const dc=new Date(inv.dataCompra+'T12:00:00');
    const now=new Date();
    const diff=Math.round((now-dc)/(1000*60*60*24));
    if(!isNaN(diff)&&diff>=0) dias=diff+' '+(diff===1?'dia':'dias')+' (em estoque)';
  }
  // Embalagens
  const embs = lst ? lstEmbalagens(lst) : [];
  const sexoLabel = inv.sexo==='F'?'F · Feminino':inv.sexo==='M'?'M · Masculino':inv.sexo==='U'?'U · Unissex':'—';
  const sexoBadge = inv.sexo?`<span class="badge bg-${inv.sexo==='F'?'pink':inv.sexo==='M'?'teal':'gray'}" style="font-size:10px;margin-left:6px">${inv.sexo}</span>`:'';

  const row = (label, value, color)=>`
    <div style="display:flex;justify-content:space-between;padding:8px 2px;border-bottom:0.5px solid var(--border);font-size:13px">
      <span style="color:var(--text2)">${label}</span>
      <span style="color:${color||'var(--text)'};font-weight:500;text-align:right">${value}</span>
    </div>`;

  document.getElementById('mc').innerHTML=`
    <div class="mbg" onclick="if(event.target===this)cm()">
      <div class="modal">
        <div class="mhdr">
          <h2>${inv.nome}${sexoBadge}</h2>
          <button class="xbtn" onclick="cm()">×</button>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
          <span class="sku">${inv.sku}</span>
          ${bStatus(inv.statusItem)}
          ${lst?bVenda('Vendido'):(ativos.length?bVenda('Ativo'):'')}
        </div>

        ${lst?`
        <div class="card" style="padding:12px 14px;margin-bottom:12px;background:${lucro>=0?'var(--teal-50)':'var(--coral-50)'};border-color:${lucro>=0?'var(--teal-100)':'var(--coral-100)'}">
          <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Lucro líquido</div>
          <div style="font-size:24px;font-weight:600;color:${lucro>=0?'var(--teal-800)':'var(--coral-800)'}">${fm(lucro)}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">Margem: ${margem.toFixed(1)}%</div>
        </div>
        `:''}

        <p class="stitle" style="margin-top:0">📦 Compra</p>
        <div class="card" style="padding:6px 14px;margin-bottom:12px">
          ${row('Categoria', inv.categoria||'—')}
          ${row('Sexo', sexoLabel)}
          ${row('Estado', inv.estadoCompra||'—')}
          ${row('Local', inv.localCompra||'—')}
          ${row('Data da compra', inv.dataCompra||'—')}
          ${row('Valor pago', fm(pago), 'var(--coral-400)')}
        </div>

        ${lst?`
        <p class="stitle">💰 Venda</p>
        <div class="card" style="padding:6px 14px;margin-bottom:12px">
          ${row('Data da venda', lst.dataVenda||'—')}
          ${row('Plataforma', lst.plataforma||'—')}
          ${row('Forma de pgto', lst.formaPgto||'—')}
          ${row('Valor vendido', fm(vendido), 'var(--teal-600)')}
          ${row('Em estoque', dias)}
        </div>
        `:ativos.length?`
        <p class="stitle">📋 Anúncios ativos</p>
        <div class="card" style="padding:6px 14px;margin-bottom:12px">
          ${ativos.map(a=>`
            ${row(a.plataforma||'—', fm(parseFloat(a.valorAlterado)||parseFloat(a.valorListado)||0))}
          `).join('')}
          ${row('Em estoque há', dias)}
        </div>
        `:`
        <div class="empty" style="padding:14px">Sem venda ou anúncio ativo</div>
        `}

        ${embs.length>0?`
        <p class="stitle">📥 Embalagens usadas</p>
        <div class="card" style="padding:6px 14px;margin-bottom:12px">
          ${embs.map(e=>{
            const ins=S.insumos.find(i=>i.id===e.insumoId);
            const nome=ins?ins.nome:'(insumo removido)';
            const subtotal=e.qtd*e.custoUnit;
            return row(`${nome} × ${e.qtd}`, fm(subtotal));
          }).join('')}
          ${row('Total embalagens', fm(custoEmb), 'var(--coral-400)')}
        </div>
        `:''}

        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn" style="flex:1" onclick='cm();openInvModalObj(${JSON.stringify(inv).replace(/'/g,"\\'")})'>✏️ Editar item</button>
          ${lst?`<button class="btn" style="flex:1" onclick='cm();openLstModalObj(${JSON.stringify(lst).replace(/'/g,"\\'")})'>✏️ Editar venda</button>`:''}
        </div>
      </div>
    </div>`;
}
